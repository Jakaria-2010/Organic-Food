<!DOCTYPE html>
<html>
<head>
<title>Report Problem</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial;
    background:#f5f5f5;
    padding:20px;
}

.box{
    max-width:400px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#d32f2f;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    background:#d32f2f;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#b71c1c;
}
</style>
</head>

<body>

<div class="box">

<h2>🚨 Report Issue</h2>

<input id="name" placeholder="Your Name">
<input id="problem" placeholder="Problem Type">
<textarea id="message" placeholder="Describe issue"></textarea>

<button onclick="sendReport()">Send Report</button>

</div>

<script type="module" src="js/report.js"></script>

</body>
</html>
