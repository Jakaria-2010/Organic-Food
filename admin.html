<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Organic Food Admin</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f5f7;
}

header{
background:#2e7d32;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h2{
font-size:22px;
}

.profile {
    
    position: relative;
    
}

#profileBtn {
    
    width: 45px;
    
    height: 45px;
    
    border: none;
    
    border-radius: 50%;
    
    background: white;
    
    font-size: 22px;
    
    cursor: pointer;
    
    transition: .3s;
    
}

#profileBtn:hover {
    
    transform: scale(1.08);
    
}

#profileMenu {
    
    position: absolute;
    
    top: 55px;
    
    right: 0;
    
    background: white;
    
    width: 240px;
    
    border-radius: 12px;
    
    box-shadow: 0 8px 20px rgba(0, 0, 0, .2);
    
    display: none;
    
    overflow: hidden;
    
    z-index: 999;
    
}

.profile-name {
    
    padding: 15px;
    
    font-weight: bold;
    
    font-size: 18px;
    
    color: #2e7d32;
    
}

.profile-email {
    
    padding: 0 15px 15px;
    
    color: #666;
    
    font-size: 13px;
    
    word-break: break-word;
    
}

.logout-item {
    
    padding: 15px;
    
    cursor: pointer;
    
    font-weight: bold;
    
    transition: .3s;
    
}

.logout-item:hover {
    
    background: #f44336;
    
    color: white;
    
}
.logout:hover {
    background: #d32f2f;
    color: white;
    transform: scale(1.05);
}
.container{
padding:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
text-align:center;
}

.card h3{
color:#555;
margin-bottom:10px;
}

.card p{
font-size:28px;
font-weight:bold;
color:#2e7d32;
}

.section{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
margin-top:20px;
}

.section h2{
margin-bottom:15px;
}

input,select{

padding:10px;
border:1px solid #ccc;
border-radius:5px;
margin:5px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#2e7d32;
color:white;
}

.status{
padding:5px 10px;
border-radius:15px;
color:white;
font-size:14px;
}

.pending{
background:orange;
}

.processing{
background:#1976d2;
}

.delivered{
background:green;
}

.cancelled{
background:red;
}

.action button{
margin:2px;
padding:5px 8px;
border:none;
border-radius:5px;
cursor:pointer;
}

@media(max-width:700px){

table{
display:block;
overflow-x:auto;
white-space:nowrap;
}

}

</style>

</head>

<script>

const btn=document.getElementById("profileBtn");

const menu=document.getElementById("profileMenu");

btn.onclick=function(e){

e.stopPropagation();

menu.style.display=
menu.style.display==="block"
?
"none"
:
"block";

}

document.onclick=function(){

menu.style.display="none";

}

</script>

<body>
    
<header>

    <div class="logo">
        🌿 Organic Food Admin
    </div>

    <div class="profile">

        <div id="avatar">
            J
        </div>

        <div id="profileMenu">

            <div class="profile-top">

                <div class="bigAvatar">
                    J
                </div>

                <h3>Administrator</h3>

                <p id="adminEmail">
                    Loading...
                </p>

            </div>

            <div class="menuItem">
                🏠 Dashboard
            </div>

            <div class="menuItem">
                ⚙️ Settings
            </div>

            <div class="menuItem logoutItem"
                 onclick="logout()">
                 🚪 Logout
            </div>

        </div>

    </div>

</header>

<div class="container">

<div class="cards">

<div class="card">
<h3>Total Orders</h3>
<p id="totalOrders">0</p>
</div>

<div class="card">
<h3>Pending</h3>
<p id="pendingOrders">0</p>
</div>

<div class="card">
<h3>Delivered</h3>
<p id="deliveredOrders">0</p>
</div>

<div class="card">
<h3>Reports</h3>
<p id="totalReports">0</p>
</div>

</div>

<div class="section">

<h2>Orders</h2>

<input
type="text"
placeholder="Search customer...">

<select>

<option>Newest First</option>

<option>Oldest First</option>

</select>

<table>

<thead>

<tr>

<th>Name</th>

<th>Phone</th>

<th>Total</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="ordersTable">

<tr>

<td colspan="5">

No orders yet.

</td>

</tr>

</tbody>

</table>

</div>

<div class="section">

<h2>Reports</h2>

<table>

<thead>

<tr>

<th>Name</th>

<th>Problem</th>

<th>Date</th>

<th>Action</th>

</tr>

</thead>

<tbody id="reportsTable">

<tr>

<td colspan="4">

No reports.

</td>

</tr>

</tbody>

</table>

</div>

</div>

</body>

</html>
