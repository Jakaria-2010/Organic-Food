<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 0;
        }
        
        header {
            background: #2e7d32;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        button {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .container {
            padding: 20px;
        }
    </style>
</head>

<body>
    
    <header>
        <h2>Organic Food Admin</h2>
        
        <button onclick="logout()">Logout</button>
    </header>
    
    <div class="container">
        
        <h3>Dashboard</h3>
        
        <p>✅ Login successful.</p>
        
        <p>The real dashboard will be added next.</p>
        
    </div>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        
        import {
            getAuth,
            onAuthStateChanged,
            signOut
        } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey:"AIzaSyD9NoaOrtABI63unHmcDHMpK6Kwv4KfqHI",
            authDomain: "organic-food-jakaria.firebaseapp.com",
            projectId: "organic-food-jakaria",
            storageBucket: "organic-food-jakaria.firebasestorage.app",
            messagingSenderId: "283724929228",
            appId: "1:283724929228:web:9693d5a5bcc7d41a1d4a69"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        // Protect admin page
        onAuthStateChanged(auth, user => {
            if (!user) {
                window.location.href = "login.html";
            }
        });
        
        // Logout
        window.logout = async function() {
            await signOut(auth);
            window.location.href = "login.html";
        };
    </script>
    
</body>

</html>
